function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
function defaultConfig(){

    general: {
      wsUrl: "ws://127.0.0.1:8080/",
      reconnect: true,
      debug: false,
      durationMs: 7000,
      transitionMs: 650,

      soundVolume: 70,
      soundEnabled: true,
      soundMode: "global",
      randomPreviewSeconds: 8
    },
    platforms: {}
  };
  Object.entries(PLATFORM_DEFS).forEach(([key, p]) => {
    cfg.platforms[key] = {
      enabled: true,
      color: p.defaultColor,
      logo: p.logo,
      useProfileImage: !!p.profileEligible,
      soundUrl: "",
      soundVolume: 70,
      events: {}
    };
    Object.entries(p.events).forEach(([eventType, e]) => {
      cfg.platforms[key].events[eventType] = { enabled: e.defaultEnabled !== false, template: e.template };
    });
  });
  return cfg;
}
function mergeConfig(user){
  const base = defaultConfig();
  if(!user || typeof user !== 'object') return base;
  if(user.general && typeof user.general === 'object') Object.assign(base.general, user.general);
  if(user.platforms && typeof user.platforms === 'object'){
    Object.keys(base.platforms).forEach(key => {
      if(user.platforms[key]){
        const incoming = user.platforms[key];
        Object.assign(base.platforms[key], incoming);
        base.platforms[key].events = base.platforms[key].events || {};
        if(incoming.events){
          Object.keys(base.platforms[key].events).forEach(ev => {
            if(incoming.events[ev]) Object.assign(base.platforms[key].events[ev], incoming.events[ev]);
          });
        }
      }
    });
  }
  return base;
}
function encodeConfig(config){
  const json = JSON.stringify(config);
  const utf8 = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1));
  return btoa(utf8).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodeConfig(raw){
  if(!raw) return null;
  try{
    let s = raw.replace(/-/g,'+').replace(/_/g,'/');
    while(s.length % 4) s += '=';
    const binary = atob(s);
    const json = decodeURIComponent(binary.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  } catch(e){ console.warn('Unable to decode config', e); return null; }
}
function labelForEvent(platformKey, eventType){
  return PLATFORM_DEFS[platformKey]?.events?.[eventType]?.label || eventType;
}
function getPlatformKeyFromSource(source){
  const src = String(source || '').trim();
  const normalized = src.toLowerCase().replace(/[^a-z0-9]/g,'');
  return Object.keys(PLATFORM_DEFS).find(key => {
    const p = PLATFORM_DEFS[key];
    return p.aliases.some(alias => String(alias).toLowerCase().replace(/[^a-z0-9]/g,'') === normalized) || key === normalized;
  }) || null;
}
function hexToRgb(hex){
  const clean = String(hex || '#7765ff').replace('#','').trim();
  const full = clean.length === 3 ? clean.split('').map(c => c+c).join('') : clean;
  const n = parseInt(full, 16);
  if(Number.isNaN(n)) return {r:119,g:101,b:255};
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}
function sanitizeText(value, fallback=''){
  if(value === undefined || value === null || value === '') return fallback;
  return String(value).replace(/[<>]/g, '').trim();
}
function flattenValues(obj, prefix='', out={}){
  if(!obj || typeof obj !== 'object') return out;
  Object.entries(obj).forEach(([k,v]) => {
    const nk = prefix ? `${prefix}.${k}` : k;
    if(v && typeof v === 'object' && !Array.isArray(v)) flattenValues(v, nk, out);
    else out[nk.toLowerCase()] = v;
  });
  return out;
}
function pick(data, keys, fallback=''){
  const flat = flattenValues(data || {});
  for(const key of keys){
    const needle = String(key).toLowerCase();
    if(flat[needle] !== undefined && flat[needle] !== null && flat[needle] !== '') return flat[needle];
  }
  for(const key of keys){
    const needle = String(key).toLowerCase();
    const found = Object.keys(flat).find(k => k.endsWith('.'+needle) || k === needle || k.includes(needle));
    if(found && flat[found] !== undefined && flat[found] !== null && flat[found] !== '') return flat[found];
  }
  return fallback;
}
function formatAmount(data){
  const amount = pick(data, ['amount','formattedAmount','currencyAmount','donationAmount','tipAmount','price','total','value','message.amount','donation.amount'], '');
  const currency = pick(data, ['currency','currencyCode','currencySymbol'], '');
  if(amount === '') return 'a';
  const str = String(amount);
  if(/[$€£¥]|usd|eur|gbp|cad|aud/i.test(str)) return str;
  if(currency) return `${currency} ${str}`;
  return str;
}
function profileImageFrom(data){
  return sanitizeText(pick(data, [
    'profileImage','profileImageUrl','profilePictureUrl','profileUrl','avatar','avatarUrl','userProfileImage','user.profileImage','user.profileImageUrl','user.avatar','user.avatarUrl','from.profileImageUrl','sender.avatar','broadcasterProfileUrl','broadcastUserProfileImage'
  ], ''));
}
function displayNameFrom(data){
  return sanitizeText(pick(data, [
    'displayName','userName','username','user','name','from','fromUser','fromUserName','gifter','gifterName','sender','senderName','subscriber','subscriberName','donor','donorName','viewer','viewerName','login','user.login','user.name','user.displayName','author','author.name','authorName','customerName','customer.name','supporterName','payerName','memberName'
  ], 'Someone'));
}
function replacementMap(data){
  const months = pick(data, ['months','cumulativeMonths','totalMonths','streakMonths','memberMonths','subscriptionMonths'], '');
  const count = pick(data, ['count','amount','giftCount','gifts','total','quantity','quantityGifted','tier'], '1');
  const viewers = pick(data, ['viewers','viewerCount','raiderCount'], '0');
  const bits = pick(data, ['bits','amount','cheerAmount','quantity'], '0');
  const reward = pick(data, ['reward','rewardName','rewardTitle','title','redemption.title','reward.title'], 'a reward');
  const cost = pick(data, ['cost','rewardCost','points','redemption.cost','reward.cost'], '');
  const recipient = pick(data, ['recipient','recipientName','toUser','toUserName','giftRecipient','giftRecipientName','targetUser','targetUserName'], 'someone');
  const tier = pick(data, ['tier','subTier','subscriptionTier','plan'], '');
  const isPrime = !!pick(data, ['isPrime','prime','subPrime'], false) || /prime/i.test(String(tier));
  return {
    amount: formatAmount(data),
    count, months: months || '1', viewers, bits,
    reward, cost: cost || '', recipient,
    tier: tier || '', tierText: isPrime ? ' with Prime' : (tier ? ` at ${tier}` : '')
  };
}
function applyTemplate(template, data){
  const map = replacementMap(data);
  return sanitizeText(String(template || '').replace(/\{([a-zA-Z0-9_]+)\}/g, (_, key) => map[key] ?? ''));
}

  root.setProperty('--scale', `${(Number(g.scale) || 100) / 100}`);
  root.setProperty('--transition-ms', `${Number(g.transitionMs) || 650}ms`);
  root.setProperty('--gradient-strength', `${Math.max(0, Math.min(100, Number(g.gradientStrength) || 78)) / 100}`);
  root.setProperty('--card-opacity', `${Math.max(0, Math.min(100, Number(g.cardOpacity) || 92)) / 100}`);
  root.setProperty('--blur', `${Number(g.blur) || 18}px`);
  root.setProperty('--font-family', g.fontFamily || 'Inter, Arial, Helvetica, sans-serif');
  stage.className = `stage ${g.position || 'center'}`;
  document.body.classList.toggle('debug', !!g.debug);
}
function platformEventEnabled(platformKey, eventType){
  const p = config.platforms[platformKey];
  if(!p || !p.enabled) return false;
  if(!PLATFORM_DEFS[platformKey]?.events?.[eventType]) return false;
  return p.events?.[eventType]?.enabled !== false;
}
function subscribePayload(){
  const events = {};
  Object.entries(PLATFORM_DEFS).forEach(([key, def]) => {
    if(!config.platforms[key]?.enabled) return;
    const enabled = Object.keys(def.events).filter(eventType => config.platforms[key].events?.[eventType]?.enabled !== false);
    if(enabled.length) events[def.source] = enabled;
  });
  return events;
}
function connect(){
  if(params.get('preview') === '1' && params.get('connect') !== '1'){
    setStatus('Preview mode');
    return;
  }
  try {
    socket = new WebSocket(config.general.wsUrl || 'ws://127.0.0.1:8080/');
    setStatus('Connecting to Streamer.bot…');
    socket.addEventListener('open', () => {
      setStatus('Connected to Streamer.bot');
      socket.send(JSON.stringify({ request: 'Subscribe', id: `spn-alerts-${Date.now()}`, events: subscribePayload() }));
    });
    socket.addEventListener('message', onSocketMessage);
    socket.addEventListener('close', () => {
      setStatus('Streamer.bot disconnected');
      if(config.general.reconnect) {
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 2500);
      }
    });
    socket.addEventListener('error', () => setStatus('Streamer.bot connection error'));
  } catch(err) {
    setStatus('WebSocket setup failed');
    if(config.general.reconnect) reconnectTimer = setTimeout(connect, 2500);
  }
}
function onSocketMessage(message){
  let packet;
  try { packet = JSON.parse(message.data); } catch(e) { return; }
  if(!packet || !packet.event) return;
  const platformKey = getPlatformKeyFromSource(packet.event.source);
  const eventType = packet.event.type;
  if(!platformKey || !platformEventEnabled(platformKey, eventType)) return;
  const alert = normalizeAlert(platformKey, eventType, packet.data || {});
  enqueue(alert);
}

function hasKnownImageExtension(path){ return /\.(svg|png|webp|jpg|jpeg|gif|avif)(\?.*)?$/i.test(String(path || '')); }
function stripImageExtension(path){ return String(path || '').replace(/\.(svg|png|webp|jpg|jpeg|gif|avif)(\?.*)?$/i, ''); }
function logoCandidates(platformKey, configuredPath){
  const def = PLATFORM_DEFS[platformKey] || {};
  const extensions = ['svg','png','webp','jpg','jpeg','gif','avif'];
  const names = Array.from(new Set([
    platformKey,
    String(def.label || '').toLowerCase().replace(/[^a-z0-9]/g,''),
    String(def.label || '').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9.-]/g,''),
    platformKey === 'kofi' ? 'ko-fi' : '',
    platformKey === 'pallygg' ? 'pally.gg' : '',
    platformKey === 'tipeeestream' ? 'tipeee-stream' : '',
    platformKey === 'streamelements' ? 'stream-elements' : '',
    platformKey === 'streamlabs' ? 'stream-labs' : '',
    platformKey === 'treatstream' ? 'treat-stream' : ''
  ].filter(Boolean)));
  const candidates = [];
  const configured = configuredPath || def.logo || `assets/logos/${platformKey}`;
  if(configured){
    candidates.push(configured);
    if(!hasKnownImageExtension(configured)) extensions.forEach(ext => candidates.push(`${configured}.${ext}`));
    else {
      const base = stripImageExtension(configured);
      extensions.forEach(ext => candidates.push(`${base}.${ext}`));
    }
  }
  names.forEach(name => extensions.forEach(ext => candidates.push(`assets/logos/${name}.${ext}`)));
  return Array.from(new Set(candidates));
}
function setImageFromCandidates(candidates, altText, fallbackText, isLogo){
  const list = (candidates || []).filter(Boolean);
  let index = 0;
  mediaWrap.classList.toggle('logo', !!isLogo);
  mediaWrap.classList.remove('failed');
  mediaFallback.textContent = fallbackText || '?';
  media.alt = altText || 'Alert image';
  media.onerror = () => {
    index += 1;
    if(index < list.length) media.src = list[index];
    else mediaWrap.classList.add('failed');
  };
  if(list.length) media.src = list[0];
  else mediaWrap.classList.add('failed');
}
function fitTextElement(el, baseSize, minSize, maxHeight, allowWrap){
  const base = Number(baseSize) || 24;
  const min = Number(minSize) || 14;
  el.style.fontSize = `${base}px`;
  el.style.whiteSpace = allowWrap ? 'normal' : 'nowrap';
  let size = base;
  const allowedHeight = Math.max(12, Number(maxHeight) || el.parentElement.clientHeight || 80);
  while(size > min && (el.scrollWidth > el.clientWidth + 1 || el.scrollHeight > allowedHeight + 1)){
    size -= 1;
    el.style.fontSize = `${size}px`;
  }
}
function fitCurrentText(){
  requestAnimationFrame(() => {
    const g = config.general;
    const wrap = usernameEl.parentElement;
    actionEl.style.maxHeight = '';
    fitTextElement(usernameEl, g.usernameSize, g.usernameMinSize || 24, Math.min(64, wrap.clientHeight), false);
    const gap = 10;
    const availableForAction = Math.max(34, wrap.clientHeight - usernameEl.offsetHeight - gap);
    actionEl.style.maxHeight = `${availableForAction}px`;
    fitTextElement(actionEl, g.actionSize, g.actionMinSize || 15, availableForAction, true);
  });
}

function normalizeAlert(platformKey, eventType, data){
  const pconf = config.platforms[platformKey] || {};
  const def = PLATFORM_DEFS[platformKey];
  const evConf = pconf.events?.[eventType] || {};
  const profile = def.profileEligible && pconf.useProfileImage !== false ? profileImageFrom(data) : '';
  const logo = pconf.logo || def.logo;
  const color = pconf.color || def.defaultColor;
  return {
    platformKey, eventType,
    username: displayNameFrom(data),
    action: applyTemplate(evConf.template || def.events[eventType]?.template || 'triggered an alert!', data),
    color,
    image: profile || logo,
    imageIsLogo: !profile,
    logoCandidates: logoCandidates(platformKey, logo),
    soundUrl: (config.general.soundMode === 'platform' && pconf.soundUrl) ? pconf.soundUrl : config.general.soundUrl,
    volume: (config.general.soundMode === 'platform' && pconf.soundUrl) ? Number(pconf.soundVolume ?? config.general.soundVolume) : Number(config.general.soundVolume),
    raw: data
  };
}
function enqueue(alert){
  queue.push(alert);
  if(!isPlaying) playNext();
}
function setPlatformColor(color){
  const rgb = hexToRgb(color);
  document.documentElement.style.setProperty('--pc-r', rgb.r);
  document.documentElement.style.setProperty('--pc-g', rgb.g);
  document.documentElement.style.setProperty('--pc-b', rgb.b);
}
function renderAlert(alert){
  setPlatformColor(alert.color);
  usernameEl.textContent = config.general.uppercaseUsername ? sanitizeText(alert.username, 'SOMEONE').toUpperCase() : sanitizeText(alert.username, 'Someone');
  actionEl.textContent = sanitizeText(alert.action, 'triggered an alert!');
  if(alert.image && !alert.imageIsLogo) {
    setImageFromCandidates([alert.image, ...alert.logoCandidates], `${alert.username} profile image`, PLATFORM_DEFS[alert.platformKey].label.slice(0,2), false);
  } else {
    setImageFromCandidates(alert.logoCandidates, `${PLATFORM_DEFS[alert.platformKey].label} logo`, PLATFORM_DEFS[alert.platformKey].label.slice(0,2), true);
  }
  fitCurrentText();
}
function playSound(alert){
  if(!config.general.soundEnabled || params.get('mute') === '1') return;
  const url = alert.soundUrl || config.general.soundUrl;
  if(!url) return;
  try {
    audio.pause();
    audio.src = url;
    audio.currentTime = 0;
    audio.volume = Math.max(0, Math.min(1, (Number(alert.volume) || 70) / 100));
    const p = audio.play();
    if(p && typeof p.catch === 'function') p.catch(() => {});
  } catch(e) {}
}
function playNext(){
  if(queue.length === 0) { isPlaying = false; return; }
  isPlaying = true;
  const alert = queue.shift();
  renderAlert(alert);
  playSound(alert);
  card.classList.remove('is-leaving');
  requestAnimationFrame(() => {
    card.classList.add('is-visible');
  });
  setTimeout(() => {
    card.classList.add('is-leaving');
    card.classList.remove('is-visible');
    setTimeout(() => {
      card.classList.remove('is-leaving');
      setTimeout(playNext, Number(config.general.betweenMs) || 0);
    }, Number(config.general.transitionMs) || 650);
  }, Number(config.general.durationMs) || 7000);
}
function randomEnabledEvent(){
  const available = [];
  Object.entries(PLATFORM_DEFS).forEach(([platformKey, p]) => {
    if(!config.platforms[platformKey]?.enabled) return;
    Object.keys(p.events).forEach(eventType => { if(platformEventEnabled(platformKey, eventType)) available.push([platformKey, eventType]); });
  });
  if(!available.length) return null;
  return available[Math.floor(Math.random() * available.length)];
}
function triggerSample(platformKey, eventType){
  if(!platformKey || !eventType) {
    const picked = randomEnabledEvent();
    if(!picked) return;
    [platformKey, eventType] = picked;
  }
  enqueue(normalizeAlert(platformKey, eventType, eventSample(platformKey, eventType)));
}
window.addEventListener('message', (event) => {
  const msg = event.data || {};
  if(msg.type === 'SPN_ALERT_CONFIG' && msg.config) { config = mergeConfig(msg.config); applySettings(); fitCurrentText(); }
  if(msg.type === 'SPN_TEST_ALERT') triggerSample(msg.platformKey, msg.eventType);
  if(msg.type === 'SPN_CLEAR_QUEUE') { queue = []; }
});
window.SPNAlerts = { triggerSample, enqueue, config };
applySettings();
connect();
if(params.get('demo') === '1') setTimeout(() => triggerSample(), 650);
if(params.get('previewAuto') === '1') {
  const ms = Math.max(3000, Number(config.general.randomPreviewSeconds || 8) * 1000);
  setTimeout(() => triggerSample(), 650);
  previewTimer = setInterval(() => triggerSample(), ms);
}
</script>
